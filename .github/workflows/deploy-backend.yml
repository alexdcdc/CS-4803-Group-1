name: Deploy backend to VPS

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/quickstarter-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_lower: ${{ steps.meta.outputs.image_lower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: echo "image_lower=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_lower }}:latest
            ${{ steps.meta.outputs.image_lower }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy/docker-compose.yml"
          target: "~/quickstarter/"
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_OWNER,GHCR_USER,GHCR_PAT,BACKEND_ENV_FILE
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/quickstarter

            # Write .env from secret (lowercased owner for GHCR pull)
            umask 077
            printf '%s\n' "$BACKEND_ENV_FILE" > .env
            GHCR_OWNER_LC=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
            grep -q '^GHCR_OWNER=' .env && sed -i "s|^GHCR_OWNER=.*|GHCR_OWNER=$GHCR_OWNER_LC|" .env || echo "GHCR_OWNER=$GHCR_OWNER_LC" >> .env

            # Authenticate to GHCR for image pulls
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker compose pull
            docker compose up -d
            docker image prune -f
