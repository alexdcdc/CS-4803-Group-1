name: Deploy landing page to quickstarter.xyz

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write CNAME for custom domain
        run: echo "quickstarter.xyz" > landing-page/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (landing-page folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing-page

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
